<!DOCTYPE HTML>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<!-- Google tag (gtag.js) -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-YZ39CFPSHV"></script>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag() { dataLayer.push(arguments); }
		gtag('js', new Date());
		gtag('config', 'G-YZ39CFPSHV');
	</script>

	<title>Jiaang Li</title>

	<meta name="author" content="Jiaang Li">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="stylesheet" type="text/css" href="css/stylesheet.css">
	<link rel="stylesheet" type="text/css" href="css/style.css">

	<!-- Data loading and rendering modules -->
	<script src="js/data-loader.js"></script>
	<script src="js/renderer.js"></script>
</head>

<body>
	<div class="container">
		<!-- Hero / Profile Section -->
		<section class="profile-section">
			<div class="profile-text">
				<h1 class="profile-name">Jiaang Li</h1>
				<div id="bio-content">
					<!-- Bio content will be loaded dynamically -->
				</div>
				<div class="profile-links" id="profile-links">
					<!-- Links will be loaded dynamically -->
				</div>
			</div>
			<div class="profile-photo">
				<img id="profile-image" alt="profile photo" src="images/profile.jpg">
			</div>
		</section>

		<!-- News Section -->
		<section class="content-section">
			<h2 class="section-heading">News</h2>
			<ul class="news-list" id="news-list">
				<!-- News items will be loaded dynamically -->
			</ul>
		</section>

		<!-- Publications Section -->
		<section class="content-section">
			<h2 class="section-heading">Publications & Preprints</h2>
			<span class="note">* denotes equal contribution</span>
			<div id="publications-list" class="publications-list">
				<!-- Publications will be loaded dynamically -->
			</div>
		</section>

		<!-- Services Section -->
		<section class="content-section">
			<h2 class="section-heading">Services</h2>
			<ul class="services-list">
				<li>Reviewer: ICML 2026, ICLR 2026, ACL Rolling Reviewer, NLLP workshop' 2023</li>
			</ul>
		</section>

		<!-- Footer -->
		<footer class="site-footer">
			<p>This page design is based on a template from <a href="https://jonbarron.info/">Jon Barron</a>. Big thanks!</p>
			<p>&copy; Jiaang Li <span class="date">2026</span></p>
		</footer>
	</div>

	<!-- Initialize and render all content -->
	<script>
		document.addEventListener('DOMContentLoaded', async () => {
			const renderer = new ContentRenderer();
			await renderer.renderAll();
		});
	</script>

</body>

</html>
